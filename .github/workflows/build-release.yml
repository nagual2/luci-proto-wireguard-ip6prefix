name: Build release packages

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq wget zstd python3

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [ -f VERSION ]; then
            echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          else
            echo "version=1.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Structure test
        run: bash tests/check_structure.sh

      - name: Build packages
        env:
          PROJECT_VERSION: ${{ steps.ver.outputs.version }}
          PKG_RELEASE: "1"
        run: make -f Makefile.build all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-proto-wireguard-ip6prefix-packages
          path: dist/*
          retention-days: 90

      - name: Attach packages to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          overwrite_files: true
